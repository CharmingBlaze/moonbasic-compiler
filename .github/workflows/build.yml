# Optional “zero-DLL” branding: builds the standard compiler binary per OS (same toolchain as CI).
# Note: true static raylib bundles live under libs/* only when added locally; CI uses system Raylib / MinGW.

name: Build Zero-DLL Release

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            output: moonbasic
          - os: windows-latest
            target: windows
            output: moonbasic.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.3'

      - name: Install Dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libenet-dev \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev

      - uses: msys2/setup-msys2@v2
        if: matrix.target == 'windows'
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-raylib

      - name: Build moonBASIC (Linux)
        if: matrix.target == 'linux'
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.output }} .
        env:
          CGO_ENABLED: '1'

      - name: Build moonBASIC (Windows)
        if: matrix.target == 'windows'
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.output }} .
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: moonbasic-${{ matrix.target }}
          path: ${{ matrix.output }}
