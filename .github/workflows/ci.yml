name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest/runtime key snapshots
        run: python3 tools/diff_manifest_runtime.py --check

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libenet-dev \
            libgl1-mesa-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev \
            xvfb

      - name: Start Xvfb
        run: Xvfb :99 -screen 0 1280x720x24 &
        env:
          DISPLAY: ':99'

      - name: Check (no window)
        run: go run . --check testdata/pretty_window.mb
        env:
          CGO_ENABLED: '1'

      - name: Check integration samples (semantic only)
        run: |
          go run . --check testdata/game_2d.mb
          go run . --check testdata/do_loop_test.mb
          go run . --check testdata/exit_continue_test.mb
          go run . --check testdata/phase_d_acceptance.mb
          go run . --check testdata/physics_demo.mb
          go run . --check testdata/enet_smoke.mb
          go run . --check testdata/net_server.mb
          go run . --check testdata/net_client.mb
          go run . --check testdata/collision_vec.mb
          go run . --check testdata/sprite3d.mb
          go run . --check testdata/include_globals.mb
          go run . --check examples/pong/main.mb
          go run . --check examples/platformer/main.mb
          go run . --check examples/fps/main.mb
          go run . --check examples/spin_cube/main.mb
          go run . --check examples/mario64/main_entities.mb
          go run . --check examples/mario64/main_easymode.mb
          go run . --check examples/terrain_chase/main.mb
          go run . --check examples/rpg/main.mb
          go run . --check examples/racing/main.mb
          go run . --check benchmarks/alu.mb
          go run . --check benchmarks/strings.mb
          go run . --check benchmarks/drawcalls.mb
          go run . --check benchmarks/models.mb
          go run . --check benchmarks/physics.mb
        env:
          CGO_ENABLED: '1'

      - name: Test all packages
        run: go test ./...
        env:
          CGO_ENABLED: '1'
          DISPLAY: ':99'

      - name: Build binary
        run: go build -o moonbasic .
        env:
          CGO_ENABLED: '1'

      - name: Doc site generation
        run: go run ./cmd/moondoc -out site-ci

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-raylib

      - name: Check (no window)
        run: go run . --check testdata/pretty_window.mb
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe

      - name: Check integration samples (semantic only)
        run: |
          go run . --check testdata/game_2d.mb
          go run . --check testdata/do_loop_test.mb
          go run . --check testdata/exit_continue_test.mb
          go run . --check testdata/phase_d_acceptance.mb
          go run . --check testdata/physics_demo.mb
          go run . --check testdata/enet_smoke.mb
          go run . --check testdata/net_server.mb
          go run . --check testdata/net_client.mb
          go run . --check testdata/collision_vec.mb
          go run . --check testdata/sprite3d.mb
          go run . --check testdata/include_globals.mb
          go run . --check examples/pong/main.mb
          go run . --check examples/platformer/main.mb
          go run . --check examples/fps/main.mb
          go run . --check examples/spin_cube/main.mb
          go run . --check examples/mario64/main_entities.mb
          go run . --check examples/mario64/main_easymode.mb
          go run . --check examples/terrain_chase/main.mb
          go run . --check examples/rpg/main.mb
          go run . --check examples/racing/main.mb
          go run . --check benchmarks/alu.mb
          go run . --check benchmarks/strings.mb
          go run . --check benchmarks/drawcalls.mb
          go run . --check benchmarks/models.mb
          go run . --check benchmarks/physics.mb
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe

      - name: Test all packages
        run: go test ./...
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe

      - name: Build binary
        run: go build -o moonbasic.exe .
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe

  # Mirrors release.yml windows-amd64: Jolt rebuild + same MinGW static-runtime ldflags + moonrun link + PE checks.
  # Catches link/flag regressions before a version tag (the default windows job does not build moonrun).
  windows_fullruntime:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - uses: msys2/setup-msys2@v2
        id: msys2_fullrt
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-raylib

      - name: Checkout Jolt Physics
        uses: actions/checkout@v4
        with:
          repository: jrouwe/JoltPhysics
          ref: v5.4.0
          path: JoltPhysics

      - name: Build Jolt static libraries (Windows)
        shell: pwsh
        env:
          JPH_SRC: ${{ github.workspace }}/JoltPhysics
        run: |
          $msys = "${{ steps.msys2_fullrt.outputs.msys2-location }}"
          $mingwBin = Join-Path $msys "mingw64\bin"
          $env:Path = "$mingwBin;$env:Path"
          Set-Location "${{ github.workspace }}"
          powershell -ExecutionPolicy Bypass -File "third_party/jolt-go/scripts/build-libs-windows.ps1"

      - name: Build moonbasic + moonrun (release parity)
        shell: bash
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2_fullrt.outputs.msys2-location }}/mingw64/bin/gcc.exe
          MOONBASIC_WINDOWS_VERSION: 'ci-${{ github.sha }}'
        run: |
          set -e
          mkdir -p dist
          . scripts/windows_fullruntime_go_ldflags.sh
          EX="$(moonbasic_windows_fullruntime_go_ldflags)"
          go build -trimpath -ldflags="${EX}" -o dist/moonbasic.exe .
          go build -trimpath -ldflags="${EX}" -tags fullruntime -o dist/moonrun.exe ./cmd/moonrun

      - name: Verify PE imports + moonrun --version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = Join-Path "${{ steps.msys2_fullrt.outputs.msys2-location }}" "mingw64\bin"
          & powershell -ExecutionPolicy Bypass -File scripts/verify_windows_pe_imports.ps1 -Exe dist/moonrun.exe -MingwBin $bin
          & powershell -ExecutionPolicy Bypass -File scripts/verify_windows_pe_imports.ps1 -Exe dist/moonbasic.exe -MingwBin $bin
          & .\dist\moonrun.exe -version

      # No headed Pong smoke here: GitHub Windows runners lack reliable OpenGL for GLFW.

  # Compile-only: core Raylib via raylib-go purego (no C compiler). raygui/DB/ENet still need CGO in full builds.
  windows_purego:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Build with CGO disabled (purego Raylib bindings)
        run: go build -o moonbasic_purego.exe .
        env:
          CGO_ENABLED: '0'

  # DB.* via modernc.org/sqlite (no mattn CGO); complements stub-only default stubs.
  linux_cgo_zero_modernc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Test with CGO disabled and modernc SQLite tag
        run: go test -tags modernc_sqlite ./...
        env:
          CGO_ENABLED: '0'

  stub-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Semantic check physics demo (no Jolt link)
        run: go run . --check testdata/physics_demo.mb
        env:
          CGO_ENABLED: '0'

      - name: Semantic check net samples (stub path)
        run: |
          go run . --check testdata/enet_smoke.mb
          go run . --check testdata/net_server.mb
          go run . --check testdata/net_client.mb
          go run . --check testdata/collision_vec.mb
          go run . --check testdata/sprite3d.mb
          go run . --check testdata/include_globals.mb
        env:
          CGO_ENABLED: '0'

      - name: Test with CGO disabled (stub path)
        run: go test ./...
        env:
          CGO_ENABLED: '0'

  # cmd/moonbasic with CGO off (matches compiler-only release); smoke --version + --check
  compiler_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Build and smoke-test standalone compiler
        run: |
          set -e
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-X moonbasic/internal/version.Version=ci" \
            -o /tmp/moonbasic ./cmd/moonbasic
          /tmp/moonbasic --version | grep -q ci
          /tmp/moonbasic --check testdata/enet_smoke.mb

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode-moonbasic/package-lock.json

      - name: Package VS Code extension (.vsix)
        run: |
          set -e
          cd editors/vscode-moonbasic
          npm ci
          npm run package
