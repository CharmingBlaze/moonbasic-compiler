# Build and publish archives when a version tag is pushed (e.g. v1.2.1).
# Artifacts:
#   - moonbasic-<tag>-{linux,windows}-amd64: full runtime (moonbasic + moonrun + README-RELEASE.txt)
#   - moonbasic-<tag>-compiler-{linux,windows}-amd64: compiler-only (CGO off; no raylib.dll for moonbasic.exe)
#   - moonbasic-<tag>-ide-{linux,windows,macos}: moonBASIC IDE + moonbasic + moonrun + README-IDE-RELEASE.txt

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Prefer Node 24 for JS-based actions (deprecation of Node 20 runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-amd64:
    needs: [vscode-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gcc \
            g++ \
            libenet-dev \
            libgl1-mesa-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev

      # Rebuild Jolt + wrapper so moonrun links against symbols expected by vendored jolt-go (committed .a may lag).
      - name: Checkout Jolt Physics
        uses: actions/checkout@v5
        with:
          repository: jrouwe/JoltPhysics
          ref: v5.4.0
          path: JoltPhysics

      - name: Build Jolt static libraries (Linux)
        run: |
          set -e
          JOLT_SRC="${GITHUB_WORKSPACE}/JoltPhysics"
          mkdir -p "$JOLT_SRC/Build/linux_amd64_release"
          cd "$JOLT_SRC/Build/linux_amd64_release"
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS="-fno-lto" \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
            -DDISABLE_CUSTOM_ALLOCATOR=ON \
            -DTARGET_UNIT_TESTS=OFF \
            -DTARGET_HELLO_WORLD=OFF \
            -DTARGET_PERFORMANCE_TEST=OFF \
            -DTARGET_SAMPLES=OFF \
            -DTARGET_VIEWER=OFF
          cmake --build . -j"$(nproc)"
          WRAPPER="${GITHUB_WORKSPACE}/third_party/jolt-go/jolt/wrapper"
          OUT="${GITHUB_WORKSPACE}/third_party/jolt-go/jolt/lib/linux_amd64"
          mkdir -p "$OUT"
          cd "$WRAPPER"
          for src in *.cpp; do
            g++ -std=c++17 -I"$JOLT_SRC" -DNDEBUG -DJPH_DISABLE_CUSTOM_ALLOCATOR \
              -DJPH_PROFILE_ENABLED -DJPH_DEBUG_RENDERER -DJPH_OBJECT_STREAM \
              -fPIC -fno-lto -c "$src" -o "${src%.cpp}.o"
          done
          ar rcs libjolt_wrapper.a *.o
          rm -f *.o
          cp libjolt_wrapper.a "$OUT/"
          cp "$JOLT_SRC/Build/linux_amd64_release/libJolt.a" "$OUT/"
          ls -lh "$OUT/"

      - name: Build moonbasic + moonrun
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          mkdir -p dist
          VER="${GITHUB_REF_NAME}"
          LD="-s -w -X moonbasic/internal/version.Version=${VER}"
          go build -trimpath -ldflags="${LD}" -o dist/moonbasic .
          go build -trimpath -ldflags="${LD}" -tags fullruntime -o dist/moonrun ./cmd/moonrun
          cp packaging/README-RELEASE.txt dist/README-RELEASE.txt

      - uses: actions/download-artifact@v5
        with:
          name: moonbasic-vscode-vsix
          path: vsix-bundle

      - name: Bundle VS Code extension + installer
        run: |
          cp vsix-bundle/*.vsix dist/
          cp packaging/INSTALL-VSCODE.sh dist/
          cp packaging/INSTALL-VSCODE.bat dist/
          chmod +x dist/INSTALL-VSCODE.sh dist/moonbasic dist/moonrun

      - name: Package (tar.gz)
        run: |
          tar czvf "moonbasic-${GITHUB_REF_NAME}-linux-amd64.tar.gz" -C dist .

      - name: Build AppImage (optional tooling)
        continue-on-error: true
        run: |
          chmod +x scripts/build_appimage.sh
          ./scripts/build_appimage.sh "${GITHUB_REF_NAME}" || echo "AppImage skipped (install linuxdeploy on runner to enable)"

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-linux-amd64
          path: moonbasic-${{ github.ref_name }}-linux-amd64.tar.gz

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: moonbasic ide/package-lock.json

      - name: Install Wails dependencies (Linux)
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build moonBASIC IDE (Linux)
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          go run ./tools/ideexport
          go run ./tools/docsexport
          cd "moonbasic ide"
          npm ci
          wails build
          mkdir -p ../ide-dist
          cp build/bin/moonbasic-ide ../ide-dist/
          cp ../dist/moonbasic ../dist/moonrun ../ide-dist/
          cp ../packaging/README-IDE-RELEASE.txt ../packaging/START-IDE.sh ../ide-dist/
          chmod +x ../ide-dist/moonbasic-ide ../ide-dist/moonbasic ../ide-dist/moonrun ../ide-dist/START-IDE.sh
          tar czvf "../moonbasic-${GITHUB_REF_NAME}-ide-linux-amd64.tar.gz" -C ../ide-dist .

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-ide-linux-amd64
          path: moonbasic-${{ github.ref_name }}-ide-linux-amd64.tar.gz

  windows-amd64:
    needs: [vscode-extension]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.3'

      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-raylib

      # moonrun (-tags fullruntime) links Jolt; build Windows .a from JoltPhysics v5.4.0 (CMake under Build/).
      - name: Checkout Jolt Physics
        uses: actions/checkout@v5
        with:
          repository: jrouwe/JoltPhysics
          ref: v5.4.0
          path: JoltPhysics

      - name: Build Jolt static libraries (Windows)
        shell: pwsh
        env:
          JPH_SRC: ${{ github.workspace }}/JoltPhysics
        run: |
          $msys = "${{ steps.msys2.outputs.msys2-location }}"
          $mingwBin = Join-Path $msys "mingw64\bin"
          $env:Path = "$mingwBin;$env:Path"
          Set-Location "${{ github.workspace }}"
          powershell -ExecutionPolicy Bypass -File "third_party/jolt-go/scripts/build-libs-windows.ps1"

      # Fully static MinGW runtime in the PE: libgcc, libstdc++, winpthread are linked from .a
      # (no libgcc/libstdc++/libwinpthread DLLs). Raylib is compiled from sources in raylib-go
      # (do not set CGO_LDFLAGS=-lraylib — that would pull raylib.dll).
      - name: Build moonbasic + moonrun
        shell: bash
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}/mingw64/bin/gcc.exe
        run: |
          set -e
          mkdir -p dist
          . scripts/windows_fullruntime_go_ldflags.sh
          EX="$(moonbasic_windows_fullruntime_go_ldflags)"
          go build -trimpath -ldflags="${EX}" -o dist/moonbasic.exe .
          go build -trimpath -ldflags="${EX}" -tags fullruntime -o dist/moonrun.exe ./cmd/moonrun
          cp packaging/README-RELEASE.txt dist/README-RELEASE.txt

      - uses: actions/download-artifact@v5
        with:
          name: moonbasic-vscode-vsix
          path: vsix-bundle

      - name: Bundle VS Code extension + installer
        shell: pwsh
        run: |
          Copy-Item vsix-bundle/*.vsix dist/
          Copy-Item packaging/INSTALL-VSCODE.bat dist/
          Copy-Item packaging/INSTALL-VSCODE.sh dist/

      - name: Verify Windows PE imports (no MinGW/Raylib DLLs)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = Join-Path "${{ steps.msys2.outputs.msys2-location }}" "mingw64\bin"
          & powershell -ExecutionPolicy Bypass -File scripts/verify_windows_pe_imports.ps1 -Exe dist/moonrun.exe -MingwBin $bin
          & powershell -ExecutionPolicy Bypass -File scripts/verify_windows_pe_imports.ps1 -Exe dist/moonbasic.exe -MingwBin $bin

      # Interactive Pong smoke is local-only (scripts/smoke_moonrun_pong.ps1): GitHub Windows
      # runners often have no working OpenGL/WGL for GLFW, so moonrun exits immediately.

      - name: Package (zip)
        shell: pwsh
        run: |
          $name = "moonbasic-${{ github.ref_name }}-windows-amd64.zip"
          Compress-Archive -Path dist/* -DestinationPath $name -Force

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-windows-amd64
          path: moonbasic-${{ github.ref_name }}-windows-amd64.zip

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: moonbasic ide/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build moonBASIC IDE (Windows)
        shell: pwsh
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}/mingw64/bin/gcc.exe
        run: |
          $ErrorActionPreference = "Stop"
          go run ./tools/ideexport
          go run ./tools/docsexport
          Set-Location "moonbasic ide"
          npm ci
          wails build
          Set-Location ..
          New-Item -ItemType Directory -Force -Path ide-dist | Out-Null
          Copy-Item "moonbasic ide\build\bin\moonbasic-ide.exe" ide-dist\
          Copy-Item dist\moonbasic.exe, dist\moonrun.exe ide-dist\
          Copy-Item packaging\README-IDE-RELEASE.txt, packaging\START-IDE.bat, packaging\START-IDE.sh ide-dist\
          $zip = "moonbasic-${{ github.ref_name }}-ide-windows-amd64.zip"
          Compress-Archive -Path ide-dist\* -DestinationPath $zip -Force

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-ide-windows-amd64
          path: moonbasic-${{ github.ref_name }}-ide-windows-amd64.zip

  macos-arm64:
    needs: [vscode-extension]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.3'

      - name: Install system dependencies
        run: brew install enet cmake

      - name: Checkout Jolt Physics
        uses: actions/checkout@v5
        with:
          repository: jrouwe/JoltPhysics
          ref: v5.4.0
          path: JoltPhysics

      - name: Build Jolt static libraries (macOS arm64)
        env:
          JOLT_SRC: ${{ github.workspace }}/JoltPhysics
        run: |
          set -e
          cd third_party/jolt-go
          chmod +x scripts/build-libs.sh
          ./scripts/build-libs.sh darwin_arm64

      - name: Build moonbasic + moonrun
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          mkdir -p dist
          VER="${GITHUB_REF_NAME}"
          LD="-s -w -X moonbasic/internal/version.Version=${VER}"
          go build -trimpath -ldflags="${LD}" -o dist/moonbasic .
          go build -trimpath -ldflags="${LD}" -tags fullruntime -o dist/moonrun ./cmd/moonrun
          cp packaging/README-RELEASE.txt dist/README-RELEASE.txt

      - uses: actions/download-artifact@v5
        with:
          name: moonbasic-vscode-vsix
          path: vsix-bundle

      - name: Bundle VS Code extension + installer
        run: |
          cp vsix-bundle/*.vsix dist/
          cp packaging/INSTALL-VSCODE.sh dist/
          cp packaging/INSTALL-VSCODE.bat dist/
          chmod +x dist/INSTALL-VSCODE.sh dist/moonbasic dist/moonrun

      - name: Package (tar.gz)
        run: |
          tar czvf "moonbasic-${GITHUB_REF_NAME}-macos-arm64.tar.gz" -C dist .

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-macos-arm64
          path: moonbasic-${{ github.ref_name }}-macos-arm64.tar.gz

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: moonbasic ide/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build moonBASIC IDE (macOS)
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          go run ./tools/ideexport
          go run ./tools/docsexport
          cd "moonbasic ide"
          npm ci
          wails build
          mkdir -p ../ide-dist
          cp build/bin/moonbasic-ide ../ide-dist/
          cp ../dist/moonbasic ../dist/moonrun ../ide-dist/
          cp ../packaging/README-IDE-RELEASE.txt ../packaging/START-IDE.sh ../ide-dist/
          chmod +x ../ide-dist/moonbasic-ide ../ide-dist/moonbasic ../ide-dist/moonrun ../ide-dist/START-IDE.sh
          tar czvf "../moonbasic-${GITHUB_REF_NAME}-ide-macos-arm64.tar.gz" -C ../ide-dist .
          xattr -cr ../ide-dist/moonbasic-ide || true

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-ide-macos-arm64
          path: moonbasic-${{ github.ref_name }}-ide-macos-arm64.tar.gz

  compiler-only-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.3'

      - name: Build compiler-only bundle (CGO off)
        env:
          MOONBASIC_VERSION: ${{ github.ref_name }}
        run: |
          chmod +x scripts/release_compiler_linux.sh
          ./scripts/release_compiler_linux.sh
          mv dist/MoonBasic-compiler-linux-amd64.tar.gz "moonbasic-${GITHUB_REF_NAME}-compiler-linux-amd64.tar.gz"

      - name: Smoke test (unpack + --version + --check)
        run: |
          set -e
          tar xzf "moonbasic-${GITHUB_REF_NAME}-compiler-linux-amd64.tar.gz"
          ./MoonBasic-compiler/moonbasic --version
          ./MoonBasic-compiler/moonbasic --check testdata/enet_smoke.mb

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-compiler-linux-amd64
          path: moonbasic-${{ github.ref_name }}-compiler-linux-amd64.tar.gz

  compiler-only-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.3'

      - name: Build compiler-only bundle (CGO off)
        env:
          MOONBASIC_VERSION: ${{ github.ref_name }}
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/release_compiler_windows.ps1 -Version "${{ github.ref_name }}"
          Move-Item -Path dist/MoonBasic-compiler-windows-amd64.zip -Destination "moonbasic-${{ github.ref_name }}-compiler-windows-amd64.zip"

      - name: Smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Expand-Archive -Path "moonbasic-${{ github.ref_name }}-compiler-windows-amd64.zip" -DestinationPath _compiler_smoke -Force
          & ".\_compiler_smoke\MoonBasic-compiler\moonbasic.exe" --version
          & ".\_compiler_smoke\MoonBasic-compiler\moonbasic.exe" --check testdata\enet_smoke.mb

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-compiler-windows-amd64
          path: moonbasic-${{ github.ref_name }}-compiler-windows-amd64.zip

  # Portable VS Code extension (syntax + LSP client). No Go required to install — only moonbasic on PATH or moonbasic.languageServerPath.
  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode-moonbasic/package-lock.json

      - name: Build VSIX
        run: |
          set -e
          cd editors/vscode-moonbasic
          npm ci
          npm run package
          cp vscode-moonbasic-*.vsix "${GITHUB_WORKSPACE}/moonbasic-${GITHUB_REF_NAME}-vscode.vsix"

      - uses: actions/upload-artifact@v5
        with:
          name: moonbasic-vscode-vsix
          path: moonbasic-${{ github.ref_name }}-vscode.vsix

  github-release:
    needs: [linux-amd64, windows-amd64, macos-arm64, compiler-only-linux, compiler-only-windows, vscode-extension]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          pattern: 'moonbasic-*'
          merge-multiple: true

      - name: Collect archives for upload
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.vsix' \) -exec cp -v {} upload/ \;
          ls -la upload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          generate_release_notes: true
          body: |
            **Builtin catalog:** The compiler always uses the full `commands.json` manifest — every release has the **same command names** for `--check`, `--lsp`, and `.mbc` output. See [dist/README.md](https://github.com/CharmingBlaze/moonbasic-compiler/blob/main/dist/README.md) (“All commands”).

            **moonBASIC IDE (desktop editor — docs built in):** `moonbasic-<tag>-ide-windows-amd64.zip`, `moonbasic-<tag>-ide-linux-amd64.tar.gz`, or `moonbasic-<tag>-ide-macos-arm64.tar.gz` — includes **`moonbasic-ide`**, **`moonbasic`**, **`moonrun`**, and **README-IDE-RELEASE.txt**. Extract and run **START-IDE.bat** (Windows) or **./START-IDE.sh** (Linux/macOS). No other tools required.

            **Full runtime (run games — graphics, physics, audio):** `moonbasic-<tag>-windows-amd64.zip`, `moonbasic-<tag>-linux-amd64.tar.gz`, or `moonbasic-<tag>-macos-arm64.tar.gz` — includes **`moonrun`**. Extract and read **README-RELEASE.txt**. Use **`moonrun game.mb`** as the primary entry point.

            **Compiler only** (tooling / CI — `.mb` → `.mbc`, `--check`, `--lsp`, no engine DLLs beside `moonbasic`): `moonbasic-<tag>-compiler-windows-amd64.zip` / `moonbasic-<tag>-compiler-linux-amd64.tar.gz`.

            **VS Code / Cursor** (optional): included in full-runtime archives — run **`moonbasic install-vscode`** or double-click **`INSTALL-VSCODE.bat`** (Windows) / **`./INSTALL-VSCODE.sh`**. Standalone: `moonbasic-<tag>-vscode.vsix`. See [Getting started — VS Code](https://github.com/CharmingBlaze/moonbasic-compiler/blob/main/docs/GETTING_STARTED.md#vs-code-syntax-and-lsp).

            **Scaffold a game:** `moonbasic new MyGame` then `moonrun main.mb` (full runtime or compiler + moonrun on PATH).

            | File | Contents |
            |------|----------|
            | `moonbasic-ide` / `moonbasic-ide.exe` | Desktop IDE — edit, docs, check, compile, run |
            | `moonbasic` / `moonbasic.exe` | Compiler (`--check`, compile to `.mbc`, `--lsp`) — full manifest |
            | `moonrun` / `moonrun.exe` | Full runtime — run `.mb` / `.mbc` games |
            | `moonbasic-<tag>-vscode.vsix` | VS Code extension (grammar + LSP client) — optional |

            User downloads page: [github.com/CharmingBlaze/moonbasic/releases](https://github.com/CharmingBlaze/moonbasic/releases)

            Docs: [Getting started](https://github.com/CharmingBlaze/moonbasic-compiler/blob/main/docs/GETTING_STARTED.md) · [Build from source](https://github.com/CharmingBlaze/moonbasic-compiler/blob/main/docs/BUILDING.md) · [dist/README.md](https://github.com/CharmingBlaze/moonbasic-compiler/blob/main/dist/README.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Mirror all release assets to the public user-facing repo (CharmingBlaze/moonbasic).
  # Add repository secret MOONBASIC_PUBLIC_TOKEN (PAT with repo scope on moonbasic).
  publish-public-moonbasic:
    needs: [github-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          pattern: 'moonbasic-*'
          merge-multiple: true

      - name: Collect archives
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.vsix' \) -exec cp -v {} upload/ \;
          ls -la upload/

      - name: Publish to CharmingBlaze/moonbasic
        env:
          GH_TOKEN: ${{ secrets.MOONBASIC_PUBLIC_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "MOONBASIC_PUBLIC_TOKEN not set — skipping public moonbasic repo mirror."
            echo "Add a PAT with repo scope on CharmingBlaze/moonbasic to enable automatic publishing."
            exit 0
          fi
          NOTES="Release ${TAG} — moonBASIC runtime, compiler, IDE, and VS Code extension.

          Download the **IDE bundle** for the easiest start: moonbasic-${TAG}-ide-* (includes editor + compiler + runtime + docs).

          See https://github.com/CharmingBlaze/moonbasic-compiler/blob/main/dist/README.md for all artifact types."
          if gh release view "$TAG" --repo CharmingBlaze/moonbasic >/dev/null 2>&1; then
            gh release upload "$TAG" upload/* --repo CharmingBlaze/moonbasic --clobber
          else
            gh release create "$TAG" upload/* --repo CharmingBlaze/moonbasic --title "$TAG" --notes "$NOTES"
          fi
