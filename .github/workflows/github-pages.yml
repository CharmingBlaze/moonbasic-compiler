# Deploy docs/downloads/ as the GitHub Pages site root (downloads-only landing).
#
# Pushes do NOT deploy by default (avoids failing when Pages is not configured).
#
# To go live at https://<org>.github.io/moonbasic/ :
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#   2. Settings → Variables → Actions → add PUBLISH_DOWNLOADS_SITE = true (auto-deploy on push)
#   3. Or skip (2) and use Actions → this workflow → "Run workflow" after changing docs/downloads/
#
name: GitHub Pages (downloads)

on:
  push:
    branches: [main]
    paths:
      - 'docs/downloads/**'
      - '.github/workflows/github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-downloads
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.PUBLISH_DOWNLOADS_SITE == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/downloads
      - id: deployment
        uses: actions/deploy-pages@v4
